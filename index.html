<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clan‑Leider‑Geil – Gaming Community</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.2/dist/tailwind.min.css">
</head>
<body class="bg-gray-900 text-white font-sans">

  <!-- Banner -->
  <header class="relative h-64 md:h-96 bg-cover bg-center"
          style="background-image: url('https://yourcdn.com/banner.jpg');">
    <div class="absolute inset-0 bg-black opacity-50"></div>
    <div class="relative z-10 flex flex-col items-center justify-center h-full text-center">
      <h1 class="text-4xl md:text-6xl font-bold">
        Willkommen beim Clan‑Leider‑Geil
      </h1>
      <p class="mt-2 text-xl">Gaming, Events & Community</p>
    </div>
  </header>

  <!-- Discord‑Widget -->
  <section class="p-4">
    <h2 class="text-2xl mb-2">Chat in Discord</h2>
    <iframe
      src="https://discord.com/widget?id=1134528880934396094&theme=dark"
      width="350" height="200" allowtransparency="true"
      frameborder="0" class="rounded-lg"></iframe>
  </section>

  <!-- Twitch‑Live -->
  <section class="p-4">
    <h2 class="text-2xl mb-2">Live auf Twitch</h2>
    <div class="w-full max-w-4xl mx-auto">
      <iframe
        src="https://player.twitch.tv/?channel=sgtsnickersnevergiveup&parent=dein-clan-geil.github.io&layout=video-with-chat&theme=dark"
        height="480" width="720" allowfullscreen frameborder="0"></iframe>
    </div>
  </section>

  <!-- YouTube‑Live (optional) -->
  <section class="p-4">
    <h2 class="text-2xl mb-2">Live auf YouTube</h2>
    <div class="w-full max-w-4xl mx-auto">
      <iframe
        width="560" height="315"
        src="https://www.youtube.com/embed/DEIN_YOUTUBE_VIDEO_ID?autoplay=1"
        title="YouTube Live" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen></iframe>
    </div>
  </section>

  <footer class="p-4 text-center text-gray-400">
    © 2024 Clan‑Leider‑Geil – Alle Rechte vorbehalten
  </footer>
</body>
</html>
